<script>
    // 页面加载完成后执行居中逻辑
    window.addEventListener('load', centerGraphElement);
    // 窗口大小改变时重新执行居中逻辑
    window.addEventListener('resize', centerGraphElement);

    /**
     * 动态计算图表元素的上下左右居中位置，并通过定位样式实现。
     */
    function centerGraphElement() {
        // 1. 获取包含图表的 DIV 元素 (mxgraph viewer 容器)
        const graphDiv = document.querySelector('.mxgraph');
        
        if (!graphDiv) {
            console.error('找不到类名为 "mxgraph" 的图表容器元素。');
            return;
        }

        // 2. 将容器的父元素 (body) 设置为相对定位，以便子元素可以绝对定位
        document.body.style.position = 'relative';
        document.body.style.minHeight = '100vh'; // 确保 body 至少占满整个视口高度
        
        // 3. 应用绝对定位居中样式
        graphDiv.style.position = 'absolute';
        graphDiv.style.top = '50%';
        graphDiv.style.left = '50%';
        
        // 4. 获取图表元素的实际宽度和高度
        const elementWidth = graphDiv.offsetWidth;
        const elementHeight = graphDiv.offsetHeight;

        // 5. 使用 transform 属性将元素平移自身宽高的一半，实现真正的中心对齐
        graphDiv.style.transform = `translate(-${elementWidth / 2}px, -${elementHeight / 2}px)`;

        // 移除可能影响定位的 margin
        graphDiv.style.margin = '0';
    }
</script>

<script type="text/javascript">

// 字符串数据
const stringData = {
    '嬴政': {
        title1: '嬴政',
        title2: '(前259-前210)',
        lines: ['秦朝开国皇帝', '统一六国的雄才大略君主，性格多疑、独断、刚毅，晚年追求长生不老。', '结束春秋战国乱局，建立皇帝制度，实行郡县制，修筑驰道，开凿灵渠。统一了文字、货币、度量衡，对中华文明影响深远。', '前210年，在第五次巡游途中，病逝于沙丘宫（今河北广宗）。他的死亡导致赵高和李斯密谋篡改遗诏。']
    },
    '胡亥': {
        title1: '胡亥',
        title2: '(前230-前207)',
        lines: ['秦朝第二位皇帝', '幼子身份，性格懦弱，宠信宦官赵高，沉迷享乐，政治上完全听命于赵高。', '继位后，为稳固皇权和满足私欲，大肆屠杀兄弟姐妹、宗室功臣；继续兴建阿房宫和陵墓，使人民徭役更重，刑罚更酷，最终激起陈胜、吴广起义，使秦朝面临全面崩溃。', '前207年，在赵高发动“望夷宫之变”后，被赵高的女婿阎乐逼迫在望夷宫自杀，时年24岁，以黔首（平民）之礼葬于杜南。']
    },
    '子婴': {
        title1: '子婴',
        title2: '(?-前206)',
        lines: ['秦朝最后一位君主', '身份存疑（侄子或兄长之子），为人仁爱，曾劝谏胡亥停止暴行，表现出果断的政治决断力。', '被赵高拥立为秦王（而非皇帝）。继位仅五日，便设下计谋，利用其子和宦官韩谈，成功诛杀专权误国的赵高，为秦朝除了一大祸患。', '面对刘邦大军兵临城下，为避免百姓受难，素车白马，系颈以组（脖子上系着绳子），向刘邦投降，秦朝灭亡。数月后（前206年），被进入咸阳的项羽处死。']
    },
    '扶苏': {
        title1: '扶苏',
        title2: '(?-前210)',
        lines: ['秦始皇长子、公子', '秦始皇长子，贤德仁厚，体恤民情，倾向于儒家思想和仁政。', '曾多次直言劝谏秦始皇停止“焚书坑儒”，减轻刑法徭役。因谏言忤逆始皇，被发配到北方上郡，监军大将蒙恬的部队，成为事实上的储君。', '秦始皇驾崩后，赵高、李斯矫诏，捏造秦始皇命令，指责扶苏为子不孝、为臣不忠，命其自杀。扶苏接到假诏书后，虽有疑虑，但在蒙恬劝谏无效后，“入室自杀”（一说拔剑自刎），蒙恬不从被囚。']
    },
};


// 初始化悬停提示
function initializeTooltips() {
    const tooltip = document.getElementById('string-tooltip');
    let currentTimeout = null;

    setTimeout(() => {
        const allElements = document.querySelectorAll('*');
        
        allElements.forEach(element => {
            const textContent = element.textContent || element.innerText;
            if (textContent && textContent.trim()) {
                for (const targetString in stringData) {
                    if (textContent.includes(targetString) && !element.querySelector('*')) {
                        element.style.cursor = 'pointer';
                        element.setAttribute('data-string', targetString);
                        
                        element.addEventListener('mouseenter', function(e) {
                            const stringInfo = stringData[targetString];
                            if (stringInfo) {
                                if (currentTimeout) {
                                    clearTimeout(currentTimeout);
                                    currentTimeout = null;
                                }
                                
                                let content = `<h4>${stringInfo.title1}</h4>`;
                                if (stringInfo.title2) {
                                    content += `<div class="title-line2">${stringInfo.title2}</div>`;
                                }
                                content += `<div class="title-separator"></div>`;
                                stringInfo.lines.forEach(line => {
                                    content += `<div class="info-line">${line}</div>`;
                                });
                                
                                tooltip.innerHTML = content;
                                
                                const rect = element.getBoundingClientRect();
                                let left = rect.left + (rect.width / 2) - 100;
                                let top = rect.top - 15;
                                
                                if (left + 200 > window.innerWidth) {
                                    left = window.innerWidth - 210;
                                }
                                if (left < 10) {
                                    left = 10;
                                }
                                if (top < 10) {
                                    top = rect.bottom + 15;
                                }
                                
                                tooltip.style.left = left + 'px';
                                tooltip.style.top = top + 'px';
                                tooltip.style.display = 'block';
                            }
                        });
                        
                        element.addEventListener('mouseleave', function() {
                            currentTimeout = setTimeout(() => {
                                tooltip.style.display = 'none';
                            }, 150);
                        });
                        
                        break;
                    }
                }
            }
        });
    }, 3000);
}

document.addEventListener('DOMContentLoaded', function() {
    setTimeout(initializeTooltips, 2000);
});

if (document.readyState === 'complete') {
    setTimeout(initializeTooltips, 2000);
} else {
    window.addEventListener('load', () => {
        setTimeout(initializeTooltips, 2000);
    });
}

<script>
// 移动端优化代码

        // 设备检测和移动端适配
        function detectDevice() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
                          || ('ontouchstart' in window)
                          || (navigator.maxTouchPoints > 0);
            return isMobile;
        }

        const isMobileDevice = detectDevice();
        console.log('设备类型检测:', isMobileDevice ? '移动设备' : '桌面设备');
        


        // 移动端交互处理
        let mobileTouchStartTime = 0;
        let mobileTooltipVisible = false;
        let touchStartX = 0;
        let touchStartY = 0;
        let longPressTimer = null;
        let touchTargetElement = null;
        const LONG_PRESS_DURATION = 1000; // 1000毫秒
        const TOUCH_MOVE_THRESHOLD = 10; // 滑动阈值
        let mobileInitialized = false;

        // 查找包含目标字符串的元素并添加移动端事件
        function setupMobileHover() {
            if (!isMobileDevice || mobileInitialized) return; // 只在移动设备上启用
            
            console.log('开始设置移动端悬停事件...');
            
            // 持续查找并绑定事件
            function bindMobileEvents() {
                const tooltip = document.getElementById('string-tooltip');
                if (!tooltip) {
                    console.log('tooltip元素未找到，延迟重试...');
                    setTimeout(bindMobileEvents, 500);

                // 查找所有可能的文本元素
                const allElements = document.querySelectorAll('*');
                let boundCount = 0;
                
                allElements.forEach(element => {
                    // 检查元素是否包含目标字符串
                    const textContent = element.textContent || element.innerText;
                    if (textContent && textContent.trim()) {
                        for (const targetString in stringData) {
                            if (textContent.includes(targetString) && !element.querySelector('*')) {
                                // 确保这是一个叶子节点（没有子元素）
                                
                                // 如果已经绑定了移动端事件，跳过
                                if (element.hasAttribute('data-mobile-bound')) continue;
                                
                                element.style.cursor = 'pointer';
                                element.setAttribute('data-string', targetString);
                                element.setAttribute('data-mobile-bound', 'true');
                                
                                // 移除原有的鼠标事件（如果存在）
                                const clone = element.cloneNode(true);
                                element.parentNode.replaceChild(clone, element);
                                
                                // 添加移动端触摸事件
                                clone.addEventListener('touchstart', handleMobileTouchStart, { passive: false });
                                clone.addEventListener('touchend', handleMobileTouchEnd, { passive: false });
                                clone.addEventListener('touchmove', handleMobileTouchMove, { passive: false });
                                clone.addEventListener('touchcancel', handleMobileTouchCancel, { passive: false });
                                
                                // 添加视觉反馈
                                clone.addEventListener('touchstart', function() {
                                    this.style.backgroundColor = 'rgba(70, 130, 180, 0.1)';
                                }, { passive: true });
                                
                                clone.addEventListener('touchend', function() {
                                    this.style.backgroundColor = '';
                                }, { passive: true });
                                
                                clone.addEventListener('touchcancel', function() {
                                    this.style.backgroundColor = '';
                                }, { passive: true });
                                
                                boundCount++;
                                console.log(`绑定移动端事件: ${targetString}`);
                                break;
                            }
                        }
                    }
                });
                
                console.log(`移动端事件绑定完成，共绑定 ${boundCount} 个元素`);
                mobileInitialized = true;
            }
            
            // 延迟执行，等待DOM和字符串数据完全加载
            setTimeout(bindMobileEvents, 3000);
        }

        function handleMobileTouchStart(event) {
            event.preventDefault();
            
            const element = event.currentTarget.closest('[data-string]') || event.currentTarget;
            const targetString = element.getAttribute('data-string');
            
            if (!targetString) return;
            
            console.log('移动端触摸开始:', targetString);
            
            mobileTouchStartTime = Date.now();
            touchStartX = event.touches[0].clientX;
            touchStartY = event.touches[0].clientY;
            touchTargetElement = element;
            
            // 清除之前的长按定时器
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
            
            // 设置长按定时器
            longPressTimer = setTimeout(() => {
                console.log('执行长按跳转:', targetString);
                const stringInfo = stringData[targetString];
                if (stringInfo && stringInfo.jumpLink) {
                    // 执行长按跳转
                    window.location.href = stringInfo.jumpLink;
                }
            }, LONG_PRESS_DURATION);
        }

        function handleMobileTouchEnd(event) {
            event.preventDefault();
            
            const element = event.currentTarget.closest('[data-string]') || event.currentTarget;
            const targetString = element.getAttribute('data-string');
            
            if (!targetString) return;
            
            const duration = Date.now() - mobileTouchStartTime;
            console.log('移动端触摸结束，耗时:', duration + 'ms');
            
            // 清除长按定时器
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
            
            // 短按显示提示框
            if (duration < LONG_PRESS_DURATION) {
                console.log('短按，显示tooltip:', targetString);
                showMobileTooltip(element, targetString);
            }
        }

        function handleMobileTouchCancel(event) {
            console.log('移动端触摸取消');
            
            // 清除长按定时器
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
            
            // 清除视觉反馈
            const element = event.currentTarget.closest('[data-string]') || event.currentTarget;
            if (element) {
                element.style.backgroundColor = '';
            }
        }

        function handleMobileTouchMove(event) {
            if (!touchStartX && !touchStartY) return;
            
            const moveX = Math.abs(event.touches[0].clientX - touchStartX);
            const moveY = Math.abs(event.touches[0].clientY - touchStartY);
            
            // 如果移动距离超过阈值，清除长按定时器
            if (moveX > TOUCH_MOVE_THRESHOLD || moveY > TOUCH_MOVE_THRESHOLD) {
                console.log('触摸移动过大，取消长按');
                if (longPressTimer) {
                    clearTimeout(longPressTimer);
                    longPressTimer = null;
                }
            }
        }

        function showMobileTooltip(element, targetString) {
            const tooltip = document.getElementById('string-tooltip');
            const stringInfo = stringData[targetString];
            
            if (stringInfo && tooltip) {
                console.log('显示移动端tooltip:', targetString);
                
                // 构建提示内容
                let content = `<h4>${stringInfo.title}</h4>`;
                stringInfo.lines.forEach(line => {
                    content += `<div class="info-line">${line}</div>`;
                });
                
                tooltip.innerHTML = content;
                
                // 移动端居中显示提示框
                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;
                const tooltipWidth = Math.min(300, windowWidth - 40); // 适配小屏幕
                const tooltipHeight = Math.min(250, windowHeight - 100);
                
                tooltip.style.left = (windowWidth - tooltipWidth) / 2 + 'px';
                tooltip.style.top = (windowHeight - tooltipHeight) / 2 + 'px';
                tooltip.style.width = tooltipWidth + 'px';
                tooltip.style.display = 'block';
                tooltip.style.position = 'fixed';
                tooltip.style.zIndex = '9999';
                tooltip.style.pointerEvents = 'none';
                
                // 添加关闭按钮
                const closeButton = document.createElement('div');
                closeButton.innerHTML = '✕';
                closeButton.style.cssText = `
                    position: absolute;
                    top: 5px;
                    right: 10px;
                    cursor: pointer;
                    color: white;
                    font-size: 16px;
                    font-weight: bold;
                `;
                closeButton.addEventListener('touchstart', function(e) {
                    e.stopPropagation();
                    closeMobileTooltip();
                }, { passive: true });
                
                tooltip.appendChild(closeButton);
                
                mobileTooltipVisible = true;
                
                // 点击其他地方关闭提示框（延迟绑定避免立即触发）
                setTimeout(() => {
                    const closeHandler = function(e) {
                        if (!tooltip.contains(e.target)) {
                            closeMobileTooltip();
                            document.removeEventListener('touchstart', closeHandler);
                        }
                    };
                    document.addEventListener('touchstart', closeHandler);
                }, 100);
            }
        }

        function closeMobileTooltip() {
            if (mobileTooltipVisible) {
                const tooltip = document.getElementById('string-tooltip');
                tooltip.style.display = 'none';
                mobileTooltipVisible = false;
                console.log('关闭移动端tooltip');
            }
        }

        // 移动端图表交互优化
        function setupMobileChartInteractions() {
            if (!isMobileDevice) return;
            
            // 优化触摸事件
            if (graphContainer) {
                // 防止默认的触摸滚动行为在图表区域内
                graphContainer.addEventListener('touchstart', handleTouchStart, { passive: false });
                graphContainer.addEventListener('touchmove', handleTouchMove, { passive: false });
                graphContainer.addEventListener('touchend', handleTouchEnd, { passive: false });
                
                // 双指缩放支持
                let initialDistance = 0;
                let initialScale = currentScale;
                
                function getTouchDistance(touches) {
                    const dx = touches[0].clientX - touches[1].clientX;
                    const dy = touches[0].clientY - touches[1].clientY;
                    return Math.sqrt(dx * dx + dy * dy);
                }
                
                function handleTouchStart(event) {
                    if (event.touches.length === 2) {
                        // 双指缩放开始
                        event.preventDefault();
                        initialDistance = getTouchDistance(event.touches);
                        initialScale = currentScale;
                    } else if (event.touches.length === 1) {
                        // 单指拖拽开始
                        handleMouseDown({
                            button: 0,
                            clientX: event.touches[0].clientX,
                            clientY: event.touches[0].clientY,
                            preventDefault: () => event.preventDefault(),
                            target: graphContainer
                        });
                    }
                }
                
                function handleTouchMove(event) {
                    event.preventDefault();
                    
                    if (event.touches.length === 2) {
                        // 双指缩放
                        const currentDistance = getTouchDistance(event.touches);
                        const scaleFactor = currentDistance / initialDistance;
                        const newScale = Math.max(0.1, Math.min(4.0, initialScale * scaleFactor));
                        
                        if (newScale !== currentScale) {
                            currentScale = newScale;
                            applyTransform();
                        }
                    } else if (event.touches.length === 1 && isDragging) {
                        // 单指拖拽
                        handleMouseMove({
                            clientX: event.touches[0].clientX,
                            clientY: event.touches[0].clientY,
                            preventDefault: () => event.preventDefault()
                        });
                    }
                }
                
                function handleTouchEnd(event) {
                    if (event.touches.length < 2) {
                        initialDistance = 0;
                    }
                    if (event.touches.length === 0) {
                        handleMouseUp();
                    }
                }
            }
        }

        // 初始化移动端功能
        function initializeMobileFeatures() {
            if (isMobileDevice) {
                console.log('初始化移动端功能...');
                
                // 重置初始化状态
                mobileInitialized = false;
                
                // 延迟初始化，确保DOM和字符串数据完全加载
                setTimeout(() => {
                    setupMobileHover();
                    setupMobileChartInteractions();
                }, 4000);
                
                // 如果第一次初始化失败，定期重试
                setTimeout(() => {
                    if (!mobileInitialized) {
                        console.log('移动端初始化可能失败，重试...');
                        setupMobileHover();
                    }
                }, 6000);
            }
        }

        // 多种时机尝试初始化移动端功能
        function tryInitializeMobile() {
            if (isMobileDevice && !mobileInitialized) {
                console.log('尝试初始化移动端功能...');
                initializeMobileFeatures();
            }
        }

        // 页面加载完成后初始化移动端功能
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(tryInitializeMobile, 3000);
        });

        if (document.readyState === 'complete') {
            setTimeout(tryInitializeMobile, 3000);
        } else {
            window.addEventListener('load', () => {
                setTimeout(tryInitializeMobile, 3000);
            });
        }
        
        // 额外保障：定期检查并初始化
        let initAttempts = 0;
        const maxInitAttempts = 5;
        
        function periodicInitCheck() {
            if (isMobileDevice && !mobileInitialized && initAttempts < maxInitAttempts) {
                initAttempts++;
                console.log(`定期检查初始化 (${initAttempts}/${maxInitAttempts})...`);
                setupMobileHover();
                if (!mobileInitialized) {
                    setTimeout(periodicInitCheck, 5000);
                }
            }
        }
        
        // 8秒后开始定期检查
        setTimeout(periodicInitCheck, 8000);

<script>
// =================== 修正版交互功能代码 ===================

let currentScale = 1;
let isDragging = false;
let lastMouseX = 0;
let lastMouseY = 0;
let graphContainer = null;
let isInitialized = false;

function waitForDiagram() {
    return new Promise((resolve) => {
        let attempts = 0;
        const maxAttempts = 50;
        
        function checkDiagram() {
            attempts++;
            const container = document.querySelector('.mxgraph');
            const svg = document.querySelector('svg');
            const canvas = document.querySelector('canvas');
            
            if (container || svg || canvas) {
                console.log('找到图表容器');
                resolve(container || svg || canvas);
                return;
            }
            
            if (attempts >= maxAttempts) {
                console.warn('未找到图表容器，使用body');
                resolve(document.body);
                return;
            }
            
            setTimeout(checkDiagram, 100);
        }
        
        checkDiagram();
    });
}

async function initializeInteractions() {
    if (isInitialized) return;
    
    console.log('初始化交互功能...');
    
    try {
        graphContainer = await waitForDiagram();
        
        if (!graphContainer) {
            console.error('无法找到图表容器');
            return;
        }
        
        if (graphContainer.style) {
            graphContainer.style.transformOrigin = 'center center';
            graphContainer.style.cursor = 'grab';
        }
        
        if (graphContainer.addEventListener) {
            graphContainer.addEventListener('wheel', handleWheelZoom, { passive: false });
            graphContainer.addEventListener('mousedown', handleMouseDown);
            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseup', handleMouseUp);
        }
        
        checkAndApplyTransform();
        isInitialized = true;
        console.log('交互功能初始化完成');
        
    } catch (error) {
        console.error('初始化出错:', error);
    }
}

function handleWheelZoom(event) {
    event.preventDefault();
    event.stopPropagation();
    
    if (!graphContainer || !isInitialized) return;
    
    const zoomFactor = event.deltaY > 0 ? 0.9 : 1.1;
    const oldScale = currentScale;
    const newScale = oldScale * zoomFactor;
    
    if (newScale >= 0.1 && newScale <= 5.0) {
        const rect = graphContainer.getBoundingClientRect();
        const mouseRelToContainerX = event.clientX - rect.left;
        const mouseRelToContainerY = event.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        const mouseRelToCenterX = mouseRelToContainerX - centerX;
        const mouseRelToCenterY = mouseRelToContainerY - centerY;
        
        const currentTransform = graphContainer.style.transform || '';
        let translateX = 0;
        let translateY = 0;
        
        const translateMatch = currentTransform.match(/translate\s*\(\s*(-?[\d.]+)px\s*,\s*(-?[\d.]+)px\)/);
        if (translateMatch) {
            translateX = parseFloat(translateMatch[1]);
            translateY = parseFloat(translateMatch[2]);
        }
        
        const scaleChange = newScale - oldScale;
        const centerAdjustX = -mouseRelToCenterX * scaleChange / oldScale;
        const centerAdjustY = -mouseRelToCenterY * scaleChange / oldScale;
        
        const finalTranslateX = translateX + centerAdjustX;
        const finalTranslateY = translateY + centerAdjustY;
        
        graphContainer.style.transform = `translate(${finalTranslateX}px, ${finalTranslateY}px) scale(${newScale})`;
        currentScale = newScale;
    }
}

function handleMouseDown(event) {
    if (!graphContainer || !isInitialized || event.button !== 0) return;
    if (!graphContainer.contains(event.target)) return;
    
    event.preventDefault();
    isDragging = true;
    lastMouseX = event.clientX;
    lastMouseY = event.clientY;
    
    if (graphContainer.style) {
        graphContainer.style.cursor = 'grabbing';
    }
}

function handleMouseMove(event) {
    if (!isDragging || !graphContainer || !isInitialized) return;
    
    event.preventDefault();
    
    const deltaX = event.clientX - lastMouseX;
    const deltaY = event.clientY - lastMouseY;
    
    const currentTransform = graphContainer.style.transform || '';
    let translateX = 0;
    let translateY = 0;
    let scale = 1;
    
    const translateMatch = currentTransform.match(/translate\s*\(\s*(-?[\d.]+)px\s*,\s*(-?[\d.]+)px\)/);
    const scaleMatch = currentTransform.match(/scale\s*\(\s*([\d.]+)\s*\)/);
    
    if (translateMatch) {
        translateX = parseFloat(translateMatch[1]);
        translateY = parseFloat(translateMatch[2]);
    }
    
    if (scaleMatch) {
        scale = parseFloat(scaleMatch[1]);
    } else {
        scale = currentScale;
    }
    
    translateX += deltaX;
    translateY += deltaY;
    
    graphContainer.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    
    lastMouseX = event.clientX;
    lastMouseY = event.clientY;
}

function handleMouseUp() {
    if (!isDragging) return;
    isDragging = false;
    
    if (graphContainer && graphContainer.style) {
        graphContainer.style.cursor = 'grab';
    }
}

function applyTransform() {
    if (!graphContainer || !isInitialized) return;
    
    const currentTransform = graphContainer.style.transform || '';
    const translateMatch = currentTransform.match(/translate\s*\(\s*(-?[\d.]+)px\s*,\s*(-?[\d.]+)px\)/);
    
    let translateX = 0;
    let translateY = 0;
    
    if (translateMatch) {
        translateX = parseFloat(translateMatch[1]);
        translateY = parseFloat(translateMatch[2]);
    }
    
    graphContainer.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
}

function checkAndApplyTransform() {
    if (!graphContainer || !isInitialized) return;
    
    const currentTransform = graphContainer.style.transform || '';
    
    if (currentTransform.includes('scale')) {
        const scaleMatch = currentTransform.match(/scale\s*\(\s*([\d.]+)\s*\)/);
        if (scaleMatch) {
            currentScale = parseFloat(scaleMatch[1]);
        }
    }
    
    applyTransform();
}

function handleKeyboardShortcuts(event) {
    if (!graphContainer || !isInitialized) return;

    switch(event.key) {
        case '+':
        case '=':
            if (event.ctrlKey || event.metaKey) {
                event.preventDefault();
                const newScale = Math.min(currentScale * 1.2, 5.0);
                if (newScale !== currentScale) {
                    currentScale = newScale;
                    applyTransform();
                }
            }
            break;
            
        case '-':
            if (event.ctrlKey || event.metaKey) {
                event.preventDefault();
                const newScale = Math.max(currentScale * 0.8, 0.1);
                if (newScale !== currentScale) {
                    currentScale = newScale;
                    applyTransform();
                }
            }
            break;
            
        case '0':
            if (event.ctrlKey || event.metaKey) {
                event.preventDefault();
                currentScale = 1;
                graphContainer.style.transform = 'scale(1)';
            }
            break;
    }
}

function resetView() {
    if (!graphContainer || !isInitialized) return;
    currentScale = 1;
    graphContainer.style.transform = 'scale(1)';
}

document.addEventListener('keydown', handleKeyboardShortcuts);

function smartInitialize() {
    setTimeout(initializeInteractions, 1000);
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(initializeInteractions, 2000);
        });
    }
    
    window.addEventListener('load', () => {
        setTimeout(() => {
            if (!isInitialized) {
                initializeInteractions();
            }
        }, 3000);
    });
    
    let retryCount = 0;
    const maxRetries = 10;
    
    function retryInit() {
        if (!isInitialized && retryCount < maxRetries) {
            retryCount++;
            setTimeout(() => {
                initializeInteractions();
                if (!isInitialized) {
                    retryInit();
                }
            }, 2000);
        }
    }
    
    setTimeout(retryInit, 5000);
}

smartInitialize();

window.resetView = resetView;
window.setScale = (scale) => {
    currentScale = Math.max(0.1, Math.min(5.0, scale));
    applyTransform();
};

console.log('修正版交互功能脚本已加载');

// 功能键JavaScript
function goBack() {
    try {
        if (window.history.length > 1) {
            window.history.back();
        }
        else if (document.referrer && document.referrer !== window.location.href) {
            window.location.href = document.referrer;
        }
        else {
            const choice = confirm('没有可返回的上一页。\n\n选择"确定"返回到上一页面\n选择"取消"刷新当前页面');
            if (choice) {
                window.history.go(-1);
            } else {
                window.location.reload();
            }
        }
    } catch (error) {
        console.log('返回操作失败，刷新页面');
        window.location.reload();
    }
}

window.addEventListener('load', function() {
    if (document.referrer && document.referrer !== window.location.href) {
        sessionStorage.setItem('previousPage', document.referrer);
        console.log('记录来源页面:', document.referrer);
    }
});

function improvedGoBack() {
    const previousPage = sessionStorage.getItem('previousPage');
    if (previousPage && previousPage !== window.location.href) {
        window.location.href = previousPage;
        return;
    }
    goBack();
}

function refreshPage() {
    window.location.reload();
}
