<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>项目信息看板</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --section-bg: #e8f1f8;
            --border-color: #dee2e6;
        }
        body { font-family: "Segoe UI", "Microsoft YaHei", sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-radius: 12px; overflow: hidden; }
        
        /* 顶部项目 Tab */
        .file-tabs { display: flex; background: var(--primary-color); padding: 12px 15px 0; gap: 8px; overflow-x: auto; }
        .tab-btn { padding: 12px 25px; border: none; cursor: pointer; background: #3e5871; color: #fff; border-radius: 8px 8px 0 0; transition: all 0.3s; white-space: nowrap; font-size: 14px; }
        .tab-btn.active { background: #fff; color: var(--primary-color); font-weight: bold; }

        /* 内容区 */
        .content-area { padding: 40px; min-height: 500px; }
        
        /* 分区标题样式 (对应 Excel 中的灰色/彩色条) */
        .section-header { 
            background: var(--section-bg); 
            color: var(--primary-color); 
            padding: 10px 15px; 
            font-weight: bold; 
            margin-top: 25px; 
            margin-bottom: 15px;
            border-left: 5px solid var(--accent-color);
            border-radius: 4px;
            font-size: 1.1em;
        }

        /* 数据行样式 */
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 30px; }
        .info-row { display: flex; align-items: center; border-bottom: 1px solid #f0f0f0; padding: 8px 0; }
        .label { font-weight: bold; width: 140px; color: #555; font-size: 14px; }
        .value { color: #222; flex: 1; font-size: 14px; }

        /* 底部 Sheet 切换 */
        .sheet-tabs { display: flex; background: #f8f9fa; border-top: 1px solid var(--border-color); padding: 5px 15px; }
        .sheet-btn { padding: 8px 20px; border: none; cursor: pointer; background: transparent; color: #666; font-size: 13px; margin-right: 10px; border-radius: 4px; }
        .sheet-btn:hover { background: #e9ecef; }
        .sheet-btn.active { color: var(--accent-color); font-weight: bold; text-decoration: underline; }

        /* 截图显示 */
        .image-display { text-align: center; padding: 20px; }
        .image-display img { max-width: 100%; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-radius: 5px; }

        .loading-tip { text-align: center; padding: 50px; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <div id="fileTabs" class="file-tabs"></div>
    <div id="displayArea" class="content-area"><div class="loading-tip">正在加载项目数据...</div></div>
    <div id="sheetTabs" class="sheet-tabs"></div>
</div>

<script>
    let allFileData = {};
    const PROJECT_DIR = "./Project/";

    async function init() {
        const fileTabs = document.getElementById('fileTabs');
        let foundAny = false;

        // 穷举 1-20.xlsx
        for (let i = 1; i <= 20; i++) {
            const fileName = `${i}.xlsx`;
            try {
                const response = await fetch(PROJECT_DIR + fileName);
                if (!response.ok) continue;
                
                const buffer = await response.arrayBuffer();
                const workbook = XLSX.read(buffer, { type: 'array' });
                
                // 处理数据
                let fileInfo = { sheets: {}, displayName: `项目 ${i}` };
                
                workbook.SheetNames.forEach((name, idx) => {
                    const ws = workbook.Sheets[name];
                    const json = XLSX.utils.sheet_to_json(ws, { header: 1 });
                    fileInfo.sheets[name] = json;
                    
                    // 动态获取项目名：扫描包含“项目名称”的单元格，取其右侧值
                    if (idx === 0) {
                        for(let row of json) {
                            let idxPN = row.indexOf("项目名称");
                            if (idxPN !== -1 && row[idxPN + 1]) {
                                fileInfo.displayName = row[idxPN + 1];
                                break;
                            }
                        }
                    }
                });

                allFileData[fileName] = fileInfo;
                
                // 创建 Tab
                const btn = document.createElement('button');
                btn.className = 'tab-btn';
                btn.id = "btn-" + fileName;
                btn.innerText = fileInfo.displayName;
                btn.onclick = () => switchFile(fileName);
                fileTabs.appendChild(btn);

                if (!foundAny) { switchFile(fileName); foundAny = true; }
            } catch (e) { console.log(fileName + " 跳过"); }
        }
    }

    function switchFile(fileName) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById("btn-" + fileName).classList.add('active');
        
        renderSheetTabs(fileName);
        const firstSheet = Object.keys(allFileData[fileName].sheets)[0];
        renderContent(fileName, firstSheet);
    }

    function renderSheetTabs(fileName) {
        const container = document.getElementById('sheetTabs');
        container.innerHTML = "";
        Object.keys(allFileData[fileName].sheets).forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'sheet-btn';
            btn.innerText = name;
            btn.onclick = (e) => {
                document.querySelectorAll('.sheet-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                renderContent(fileName, name);
            };
            container.appendChild(btn);
        });
        container.firstChild.classList.add('active');
    }

    function renderContent(fileName, sheetName) {
        const display = document.getElementById('displayArea');
        const data = allFileData[fileName].sheets[sheetName];
        const sheetIndex = Object.keys(allFileData[fileName].sheets).indexOf(sheetName);

        // 如果是第二个 Sheet，显示截图
        if (sheetIndex === 1) {
            display.innerHTML = `
                <div class="image-display">
                    <h3>${sheetName}</h3>
                    <img src="${PROJECT_DIR}${fileName.replace('.xlsx', '.jpg')}" onerror="this.src='https://via.placeholder.com/800x400?text=暂无截图+请放置${fileName.replace('.xlsx', '.jpg')}'">
                </div>`;
            return;
        }

        // 渲染文本内容
        let html = "";
        let inGrid = false;

        data.forEach((row) => {
            // 过滤空行
            const filteredRow = row.filter(cell => cell !== null && cell !== "");
            if (filteredRow.length === 0) return;

            // 识别分区标题（例如：项目关键数据、防爆区域等）
            // 逻辑：如果一行中只有一个有效值，或者是特定的关键词，且在 B 列左右
            if (row[1] && !row[2]) {
                if (inGrid) { html += `</div>`; inGrid = false; }
                html += `<div class="section-header">${row[1]}</div>`;
            } 
            // 识别键值对（固定部分：变量部分）
            else if (row[1] && row[2]) {
                if (!inGrid) { html += `<div class="data-grid">`; inGrid = true; }
                html += `
                    <div class="info-row">
                        <div class="label">${row[1]}</div>
                        <div class="value">${row[2]}</div>
                    </div>`;
            }
        });

        if (inGrid) html += `</div>`;
        display.innerHTML = html || "未识别到有效内容";
    }

    init();
</script>
</body>
</html>
