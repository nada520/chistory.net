<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>项目信息管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --header-bg: #34495e;
            --label-bg: #f8f9fa;
            --border-color: #dcdfe6;
            --accent-blue: #2980b9;
        }
        body { font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #eaedf1; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; box-shadow: 0 5px 25px rgba(0,0,0,0.1); border-radius: 4px; }
        
        /* 顶部文件切换 */
        .file-tabs { display: flex; background: var(--header-bg); padding: 10px 15px 0; gap: 4px; }
        .tab-btn { padding: 10px 20px; border: none; cursor: pointer; background: #2c3e50; color: #aeb9c2; border-radius: 4px 4px 0 0; font-size: 14px; transition: 0.2s; }
        .tab-btn.active { background: #fff; color: #333; font-weight: bold; }

        /* 内容区：模拟 Excel 样式 */
        .content-area { padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; background: #fff; }
        td { border: 1px solid var(--border-color); padding: 8px 12px; font-size: 13px; line-height: 1.5; min-height: 30px; word-break: break-word; }

        /* 颜色分区逻辑 */
        .row-section-header { background: #5d6d7e !important; color: white !important; font-weight: bold; text-align: center; }
        .row-sub-header { background: #ebedef; font-weight: bold; color: #444; }
        .cell-label { background: var(--label-bg); font-weight: bold; color: #333; width: 120px; }
        .cell-value { color: #555; }
        .cell-empty { background: #fafafa; }

        /* 底部 Sheet 切换 */
        .sheet-tabs { display: flex; background: #f0f0f0; border-top: 1px solid #ccc; padding: 0 10px; }
        .sheet-btn { padding: 8px 15px; border: none; cursor: pointer; background: transparent; color: #666; border-right: 1px solid #ddd; }
        .sheet-btn.active { background: #fff; color: var(--accent-blue); font-weight: bold; }

        /* 图片展示 */
        .img-box { text-align: center; padding: 30px; }
        .img-box img { max-width: 90%; border: 1px solid #ddd; padding: 5px; background: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div id="fileTabs" class="file-tabs"></div>
    <div id="displayArea" class="content-area"></div>
    <div id="sheetTabs" class="sheet-tabs"></div>
</div>

<script>
    let allFileData = {};
    const PROJECT_DIR = "./Project/";

    async function loadProjects() {
        for (let i = 1; i <= 20; i++) {
            const fileName = `${i}.xlsx`;
            try {
                const res = await fetch(PROJECT_DIR + fileName);
                if (!res.ok) break;
                
                const buffer = await res.arrayBuffer();
                const wb = XLSX.read(buffer, { type: 'array' });
                const fileData = { sheets: {}, projectName: "" };

                wb.SheetNames.forEach((name, idx) => {
                    const ws = wb.Sheets[name];
                    const json = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
                    fileData.sheets[name] = json;
                    
                    // 按照您的布局，项目名称在第4行，第2列 (B4)
                    if (idx === 0 && json[3] && json[3][2]) {
                        fileData.projectName = json[3][2];
                    }
                });

                allFileData[fileName] = fileData;
                createFileTab(fileName, fileData.projectName || `项目 ${i}`);
                if (i === 1) switchFile(fileName);
            } catch (e) { break; }
        }
    }

    function createFileTab(id, name) {
        const btn = document.createElement('button');
        btn.className = 'tab-btn';
        btn.id = "btn-" + id;
        btn.innerText = name;
        btn.onclick = () => switchFile(id);
        document.getElementById('fileTabs').appendChild(btn);
    }

    function switchFile(id) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById("btn-" + id).classList.add('active');
        
        const sheets = Object.keys(allFileData[id].sheets);
        renderSheetTabs(id, sheets);
        renderSheet(id, sheets[0]);
    }

    function renderSheetTabs(fileId, sheets) {
        const container = document.getElementById('sheetTabs');
        container.innerHTML = "";
        sheets.forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'sheet-btn';
            btn.innerText = name;
            btn.onclick = (e) => {
                document.querySelectorAll('.sheet-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                renderSheet(fileId, name);
            };
            container.appendChild(btn);
        });
        container.firstChild.classList.add('active');
    }

    function renderSheet(fileId, sheetName) {
        const display = document.getElementById('displayArea');
        const data = allFileData[fileId].sheets[sheetName];
        const sheetIndex = Object.keys(allFileData[fileId].sheets).indexOf(sheetName);

        if (sheetIndex === 1) {
            display.innerHTML = `<div class="img-box"><img src="${PROJECT_DIR}${fileId.replace('.xlsx', '.jpg')}" onerror="this.parentElement.innerHTML='<h3>未找到截图</h3><p>请确保 Project 文件夹中有 ${fileId.replace('.xlsx', '.jpg')}</p>'"></div>`;
            return;
        }

        let tableHtml = "<table>";
        data.forEach((row, rowIndex) => {
            // 跳过全空行
            if (row.every(cell => cell === "")) return;

            tableHtml += "<tr>";
            row.forEach((cell, colIndex) => {
                // 忽略 Excel 的第一列（通常是 A 列空白占位）
                if (colIndex === 0) return;

                let className = "cell-value";
                
                // 1. 识别大标题分区 (例如：项目关键数据)
                if (cell !== "" && row.filter(c => c !== "").length === 1) {
                    className = "row-section-header";
                    tableHtml += `<td colspan="${row.length}" class="${className}">${cell}</td>`;
                    return;
                }

                // 2. 识别小标题/固定部分 (黑体字部分)
                // 在您的 Excel 中，B列通常是标签
                if (colIndex === 1 && cell !== "") {
                    className = "cell-label";
                } else if (cell === "") {
                    className = "cell-empty";
                }

                // 3. 针对“货物类型”这一行的特殊处理（含有I, II, III...）
                if (row.includes("I") && row.includes("II")) {
                    className = "row-sub-header";
                }

                tableHtml += `<td class="${className}">${cell}</td>`;
            });
            tableHtml += "</tr>";
        });
        tableHtml += "</table>";
        display.innerHTML = tableHtml;
    }

    loadProjects();
</script>
</body>
</html>
