<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>项目信息管理系统 - 修正版</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --title-bg: #4a5a6a; /* 深灰色标题 */
            --label-bg: #f5f7fa; /* 标签淡灰色 */
            --border-color: #dcdfe6;
            --active-blue: #3498db;
        }
        body { font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.1); border-radius: 4px; }
        
        /* 顶部导航 */
        .file-tabs { display: flex; background: #2c3e50; padding: 10px 15px 0; gap: 5px; overflow-x: auto; }
        .tab-btn { padding: 10px 20px; border: none; cursor: pointer; background: #3e4f5f; color: #fff; border-radius: 4px 4px 0 0; font-size: 14px; white-space: nowrap; }
        .tab-btn.active { background: #fff; color: #2c3e50; font-weight: bold; }

        /* 表格区域 */
        .content-area { padding: 20px; min-height: 500px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        td { border: 1px solid var(--border-color); padding: 10px 12px; font-size: 13px; min-height: 35px; word-break: break-all; }

        /* 样式分区核心逻辑 */
        /* 1. 大标题分区（如项目关键数据） */
        .row-main-header { background: var(--title-bg) !important; color: #fff !important; font-weight: bold; text-align: center; letter-spacing: 2px; }
        /* 2. 第一列标签（项目名称、购买方等） */
        .cell-label { background: var(--label-bg); font-weight: bold; color: #333; width: 150px; text-align: left; }
        /* 3. 数据值 */
        .cell-value { color: #555; background: #fff; }
        /* 4. 子表头（如 I, II, III...） */
        .row-sub-header { background: #ebedef; font-weight: bold; color: #444; text-align: center; }

        /* 底部 Sheet 切换 */
        .sheet-tabs { display: flex; background: #fafafa; border-top: 1px solid #ddd; padding: 0 10px; }
        .sheet-btn { padding: 8px 15px; border: none; cursor: pointer; background: transparent; color: #666; font-size: 13px; border-right: 1px solid #ddd; }
        .sheet-btn.active { background: #fff; color: var(--active-blue); font-weight: bold; border-bottom: 2px solid var(--active-blue); }

        .img-container { text-align: center; padding: 20px; }
        .img-container img { max-width: 100%; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container">
    <div id="fileTabs" class="file-tabs"></div>
    <div id="displayArea" class="content-area"></div>
    <div id="sheetTabs" class="sheet-tabs"></div>
</div>

<script>
    let allFileData = {};
    const PROJECT_DIR = "./Project/";

    async function loadData() {
        for (let i = 1; i <= 20; i++) {
            const fileName = `${i}.xlsx`;
            try {
                const res = await fetch(PROJECT_DIR + fileName);
                if (!res.ok) break;
                
                const buffer = await res.arrayBuffer();
                const wb = XLSX.read(buffer, { type: 'array' });
                const fileObj = { sheets: {}, projectName: `项目 ${i}` };

                wb.SheetNames.forEach((name, idx) => {
                    const ws = wb.Sheets[name];
                    // 获取包含所有单元格的二维数组，defval:"" 确保空单元格不被跳过
                    const json = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
                    fileObj.sheets[name] = json;
                    
                    // 动态定位“项目名称”标签并获取其右侧的值
                    if (idx === 0) {
                        for(let r=0; r<json.length; r++) {
                            const pIdx = json[r].indexOf("项目名称");
                            if (pIdx !== -1 && json[r][pIdx+1]) {
                                fileObj.projectName = json[r][pIdx+1];
                                break;
                            }
                        }
                    }
                });

                allFileData[fileName] = fileObj;
                addFileTab(fileName, fileObj.projectName);
                if (i === 1) switchFile(fileName);
            } catch (e) { break; }
        }
    }

    function addFileTab(id, name) {
        const btn = document.createElement('button');
        btn.className = 'tab-btn';
        btn.id = "f-" + id;
        btn.innerText = name;
        btn.onclick = () => switchFile(id);
        document.getElementById('fileTabs').appendChild(btn);
    }

    function switchFile(id) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById("f-" + id).classList.add('active');
        
        const sheets = Object.keys(allFileData[id].sheets);
        renderSheetTabs(id, sheets);
        renderContent(id, sheets[0]);
    }

    function renderSheetTabs(fid, sheets) {
        const container = document.getElementById('sheetTabs');
        container.innerHTML = "";
        sheets.forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'sheet-btn';
            btn.innerText = name;
            btn.onclick = (e) => {
                document.querySelectorAll('.sheet-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                renderContent(fid, name);
            };
            container.appendChild(btn);
        });
        container.firstChild.classList.add('active');
    }

    function renderContent(fid, sname) {
        const area = document.getElementById('displayArea');
        const data = allFileData[fid].sheets[sname];
        const sIndex = Object.keys(allFileData[fid].sheets).indexOf(sname);

        if (sIndex === 1) {
            area.innerHTML = `<div class="img-container"><img src="${PROJECT_DIR}${fid.replace('.xlsx', '.jpg')}" onerror="this.src='https://via.placeholder.com/800x400?text=未找到截图文件(${fid.replace('.xlsx', '.jpg')})'"></div>`;
            return;
        }

        let html = "<table>";
        data.forEach((row) => {
            // 彻底过滤掉 A 列及其之前的空白，从 B 列（索引 1）开始处理内容
            const content = row.slice(1); 
            if (content.every(c => c === "")) return; // 跳过全空行

            // 识别整行大标题（如：项目关键数据）
            const nonEmpty = content.filter(c => c !== "");
            if (nonEmpty.length === 1 && content[0] !== "") {
                html += `<tr><td colspan="${content.length}" class="row-main-header">${nonEmpty[0]}</td></tr>`;
                return;
            }

            html += "<tr>";
            content.forEach((cell, cIdx) => {
                let cls = "cell-value";
                
                // 第一列（原本的 B 列）识别为标签
                if (cIdx === 0 && cell !== "") {
                    cls = "cell-label";
                }
                
                // 识别子表头（I, II, III...）
                if (content.includes("I") || cell === "I") {
                    cls = "row-sub-header";
                }

                html += `<td class="${cls}">${cell}</td>`;
            });
            html += "</tr>";
        });
        html += "</table>";
        area.innerHTML = html;
    }

    window.onload = loadData;
</script>
</body>
</html>
