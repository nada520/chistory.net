<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目信息展示</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        /* Excel文件Tab */
        .excel-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .excel-tab {
            padding: 12px 24px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 8px 8px 0 0;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .excel-tab:hover {
            background: rgba(255,255,255,0.3);
        }
        .excel-tab.active {
            background: #fff;
            color: #667eea;
            font-weight: bold;
        }

        /* Sheet Tab */
        .sheet-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            padding: 0 15px;
        }
        .sheet-tab {
            padding: 10px 20px;
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 20px;
            color: #667eea;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .sheet-tab:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .sheet-tab.active {
            background: #667eea;
            color: #fff;
        }

        /* 内容区域 */
        .content-area {
            background: #fff;
            border-radius: 0 15px 15px 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            min-height: 500px;
        }

        /* 数据表格 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th,
        .data-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .data-table th {
            background: #f8f9fa;
            font-weight: normal;
            color: #333;
            width: 180px;
        }
        .data-table td {
            color: #555;
        }
        .data-table tr:hover {
            background: #f8f9fa;
        }
        .label-cell {
            font-weight: bold;
            color: #333;
            background: #f0f4ff;
        }
        .value-cell {
            color: #667eea;
        }

        /* 图片展示 */
        .image-container {
            text-align: center;
            padding: 20px;
        }
        .image-container img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #667eea;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 图片网格布局 */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .image-card {
            background: #f8f9fa;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s;
        }
        .image-card:hover {
            transform: scale(1.02);
        }
        .image-card img {
            width: 100%;
            height: auto;
            display: block;
        }
        .image-card .caption {
            padding: 10px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>项目信息展示平台</h1>

        <!-- Excel文件切换Tab -->
        <div class="excel-tabs" id="excelTabs">
            <!-- 动态生成 -->
        </div>

        <!-- Sheet切换Tab -->
        <div class="sheet-tabs" id="sheetTabs">
            <!-- 动态生成 -->
        </div>

        <!-- 内容区域 -->
        <div class="content-area" id="contentArea">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在加载数据...</p>
            </div>
        </div>
    </div>

    <script>
        let workbookData = {};
        let currentExcel = null;
        let currentSheet = null;

        // 初始化
        async function init() {
            await loadExcelFiles();
        }

        // 加载Project文件夹中的所有Excel文件
        async function loadExcelFiles() {
            try {
                // 使用fetch获取Project文件夹内容
                const response = await fetch('Project/');

                if (!response.ok) {
                    // 如果fetch失败，尝试直接加载已知的Excel文件
                    await loadSingleExcel('Project/' + encodeURIComponent('PIC 缅甸项目信息.xlsx'));
                    return;
                }

                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const links = doc.querySelectorAll('a');

                const excelFiles = [];
                links.forEach(link => {
                    const href = link.getAttribute('href');
                    if (href && (href.endsWith('.xlsx') || href.endsWith('.xls'))) {
                        excelFiles.push('Project/' + href);
                    }
                });

                if (excelFiles.length === 0) {
                    // 如果没有找到文件，尝试加载默认文件
                    await loadSingleExcel('Project/' + encodeURIComponent('PIC 缅甸项目信息.xlsx'));
                } else {
                    for (const file of excelFiles) {
                        await loadSingleExcel(file);
                    }
                    renderExcelTabs();
                    if (Object.keys(workbookData).length > 0) {
                        const firstExcel = Object.keys(workbookData)[0];
                        selectExcel(firstExcel);
                    }
                }
            } catch (error) {
                console.error('Error loading files:', error);
                // 尝试直接加载Excel文件
                await loadSingleExcel('Project/' + encodeURIComponent('PIC 缅甸项目信息.xlsx'));
            }
        }

        // 加载单个Excel文件
        async function loadSingleExcel(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    console.warn('File not found:', url);
                    return;
                }
                const buffer = await response.arrayBuffer();
                const workbook = XLSX.read(buffer, { type: 'array', cellImages: true });

                // 获取文件名
                const fileName = decodeURIComponent(url.split('/').pop().replace('.xlsx', '').replace('.xls', ''));
                workbookData[fileName] = {
                    url: url,
                    workbook: workbook,
                    sheets: {}
                };

                // 处理每个sheet
                workbook.SheetNames.forEach(sheetName => {
                    const sheet = workbook.Sheets[sheetName];
                    workbookData[fileName].sheets[sheetName] = sheet;
                });

                renderExcelTabs();
                if (!currentExcel) {
                    selectExcel(fileName);
                }
            } catch (error) {
                console.error('Error loading Excel:', url, error);
            }
        }

        // 渲染Excel文件Tab
        function renderExcelTabs() {
            const tabsContainer = document.getElementById('excelTabs');
            tabsContainer.innerHTML = '';

            const excelNames = Object.keys(workbookData);
            excelNames.forEach((name, index) => {
                const tab = document.createElement('button');
                tab.className = 'excel-tab' + (index === 0 ? ' active' : '');
                tab.textContent = name;
                tab.onclick = () => selectExcel(name);
                tabsContainer.appendChild(tab);
            });
        }

        // 选择Excel文件
        function selectExcel(excelName) {
            currentExcel = excelName;

            // 更新Tab样式
            document.querySelectorAll('.excel-tab').forEach(tab => {
                tab.classList.toggle('active', tab.textContent === excelName);
            });

            // 渲染Sheet Tab
            renderSheetTabs();

            // 默认选择第一个sheet
            const sheetNames = Object.keys(workbookData[excelName].sheets);
            if (sheetNames.length > 0) {
                selectSheet(sheetNames[0]);
            }
        }

        // 渲染Sheet Tab
        function renderSheetTabs() {
            const tabsContainer = document.getElementById('sheetTabs');
            tabsContainer.innerHTML = '';

            const sheetNames = Object.keys(workbookData[currentExcel].sheets);
            sheetNames.forEach((name, index) => {
                const tab = document.createElement('button');
                tab.className = 'sheet-tab' + (index === 0 ? ' active' : '');
                tab.textContent = name;
                tab.onclick = () => selectSheet(name);
                tabsContainer.appendChild(tab);
            });
        }

        // 选择Sheet
        function selectSheet(sheetName) {
            currentSheet = sheetName;

            // 更新Tab样式
            document.querySelectorAll('.sheet-tab').forEach(tab => {
                tab.classList.toggle('active', tab.textContent === sheetName);
            });

            // 渲染内容
            renderSheetContent();
        }

        // 渲染Sheet内容
        function renderSheetContent() {
            const contentArea = document.getElementById('contentArea');
            const sheet = workbookData[currentExcel].sheets[currentSheet];

            // 提取单元格数据
            const range = XLSX.utils.decode_range(sheet['!ref'] || 'A1');

            // 检查是否包含图片
            const hasImages = sheet.MergeCells || (sheet['!images'] && sheet['!images'].length > 0);

            // 检查是否有图片数据
            let hasImageData = false;
            if (sheet && sheet.MergeCells) {
                hasImageData = true;
            }

            // 提取数据并区分黑体和非黑体
            const data = [];
            const maxCol = Math.min(range.e.c + 1, 15); // 限制列数

            for (let R = range.s.r; R <= range.e.r; R++) {
                const row = [];
                for (let C = range.s.c; C < maxCol; C++) {
                    const addr = XLSX.utils.encode_cell({ r: R, c: C });
                    const cell = sheet[addr];

                    if (cell) {
                        const isBold = cell.s && cell.s.font && cell.s.font.bold;
                        const value = cell.v !== undefined ? String(cell.v) : '';
                        row.push({ value, isBold, address: addr });
                    } else {
                        row.push({ value: '', isBold: false, address: addr });
                    }
                }

                // 只添加有内容的行
                if (row.some(cell => cell.value.trim())) {
                    data.push(row);
                }
            }

            // 检查是否是图片sheet（第二页通常包含图片）
            const sheetIndex = Object.keys(workbookData[currentExcel].sheets).indexOf(currentSheet);
            const isImageSheet = sheetIndex === 1 || hasImageData;

            if (isImageSheet && data.length <= 1) {
                // 作为图片sheet处理
                renderImageSheet(contentArea, sheet);
            } else {
                // 作为数据表格处理
                renderDataTable(contentArea, data);
            }
        }

        // 渲染数据表格
        function renderDataTable(container, data) {
            let html = '<table class="data-table"><tbody>';

            data.forEach(row => {
                // 检查这一行是否应该作为key-value对显示
                const hasLabels = row.some(cell => cell.isBold && cell.value.trim());
                const hasValues = row.some(cell => !cell.isBold && cell.value.trim());

                if (hasLabels && hasValues) {
                    // 作为key-value对显示
                    html += '<tr>';
                    row.forEach(cell => {
                        if (cell.value.trim()) {
                            if (cell.isBold) {
                                html += `<th class="label-cell">${escapeHtml(cell.value)}</th>`;
                            } else {
                                html += `<td class="value-cell">${escapeHtml(cell.value)}</td>`;
                            }
                        }
                    });
                    html += '</tr>';
                } else if (row.every(cell => !cell.isBold)) {
                    // 非黑体行，作为表头或数据行
                    html += '<tr>';
                    row.forEach(cell => {
                        if (cell.value.trim()) {
                            html += `<td style="font-weight: bold; text-align: center;">${escapeHtml(cell.value)}</td>`;
                        }
                    });
                    html += '</tr>';
                } else if (row.every(cell => cell.isBold)) {
                    // 全是黑体，作为分组标题
                    html += '<tr>';
                    row.forEach(cell => {
                        if (cell.value.trim()) {
                            html += `<td colspan="10" style="font-weight: bold; background: #667eea; color: white; text-align: center; padding: 15px;">${escapeHtml(cell.value)}</td>`;
                        }
                    });
                    html += '</tr>';
                } else {
                    // 混合内容
                    html += '<tr>';
                    row.forEach(cell => {
                        if (cell.value.trim()) {
                            const cls = cell.isBold ? 'label-cell' : 'value-cell';
                            html += `<td class="${cls}">${escapeHtml(cell.value)}</td>`;
                        }
                    });
                    html += '</tr>';
                }
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // 渲染图片Sheet
        function renderImageSheet(container, sheet) {
            let html = '<div class="image-grid">';

            // 尝试提取嵌入的图片
            if (sheet['!images']) {
                sheet['!images'].forEach((img, index) => {
                    if (img.data && img.data.data) {
                        // 处理base64图片数据
                        const base64 = arrayBufferToBase64(img.data.data);
                        const mimeType = img.data.type || 'image/png';
                        html += `
                            <div class="image-card">
                                <img src="data:${mimeType};base64,${base64}" alt="Sheet Image ${index + 1}">
                            </div>
                        `;
                    } else if (img.base64) {
                        html += `
                            <div class="image-card">
                                <img src="${img.base64}" alt="Sheet Image ${index + 1}">
                            </div>
                        `;
                    }
                });
            }

            // 如果没有嵌入图片，尝试从其他来源获取
            if (!sheet['!images'] || sheet['!images'].length === 0) {
                // 检查sheet中是否有图片URL或引用
                const range = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
                for (let R = range.s.r; R <= range.e.r; R++) {
                    for (let C = range.s.c; C <= range.e.c; C++) {
                        const addr = XLSX.utils.encode_cell({ r: R, c: C });
                        const cell = sheet[addr];
                        if (cell && cell.v && (String(cell.v).match(/\.(jpg|jpeg|png|gif|bmp|webp)$/i) || String(cell.v).startsWith('http'))) {
                            const imgUrl = cell.v;
                            html += `
                                <div class="image-card">
                                    <img src="${imgUrl}" alt="Image from cell ${addr}" onerror="this.parentElement.innerHTML='<div class=\\'caption\\'>图片加载失败</div>'">
                                </div>
                            `;
                        }
                    }
                }
            }

            html += '</div>';

            // 如果仍然没有图片，显示提示
            if (html === '<div class="image-grid"></div>') {
                html = `
                    <div class="image-container">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <p>此Sheet暂无图片内容</p>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        // 辅助函数：将ArrayBuffer转换为Base64
        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return window.btoa(binary);
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 启动
        init();
    </script>

<script>
/**
 * Iframe 元素高亮注入脚本
 * 需要在目标网站中引入此脚本来支持跨域 iframe 高亮功能
 *
 * 使用方法：
 * 1. 将此脚本添加到目标网站的 HTML 中
 * 2. 或通过浏览器扩展、用户脚本等方式注入
 */

(function () {
  "use strict";

  // 检查是否在 iframe 中
  if (window.self === window.top) {
    return; // 不在 iframe 中，不执行
  }

  // 检查是否已经初始化过
  if (window.__iframeHighlightInitialized) {
    return;
  }
  window.__iframeHighlightInitialized = true;
  console.log("Iframe 高亮脚本已加载");

  // 创建高亮覆盖层
  var overlay = document.createElement("div");
  overlay.id = "iframe-highlight-overlay";
  overlay.style.cssText = "\n    position: fixed;\n    top: 0;\n    left: 0;\n    width: 100vw;\n    height: 100vh;\n    pointer-events: none;\n    z-index: 999999;\n    overflow: hidden;\n  ";

  // 创建悬停高亮框（虚线边框）
  var highlightBox = document.createElement("div");
  highlightBox.id = "iframe-highlight-box";
  highlightBox.style.cssText = "\n    position: absolute;\n    border: 2px dashed #007AFF;\n    background: rgba(0, 122, 255, 0.08);\n    pointer-events: none;\n    display: none;\n    transition: all 0.1s ease;\n    box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.8);\n    border-radius: 2px;\n  ";

  // 创建选中节点的常驻高亮框（实线边框）
